<!DOCTYPE html>
<html lang="eu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sartu - Hitano Bihurtzailea</title>
    <style>
        :root {
            --primary: #2d6a4f;
            --primary-light: #40916c;
            --primary-dark: #1b4332;
            --accent: #d4a373;
            --bg: #f8f9fa;
            --surface: #ffffff;
            --text: #212529;
            --text-muted: #6c757d;
            --border: #dee2e6;
            --radius: 12px;
            --shadow-lg: 0 4px 16px rgba(0,0,0,0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 380px;
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo h1 {
            font-size: 1.5rem;
            color: var(--primary-dark);
            font-weight: 700;
        }

        .logo p {
            color: var(--text-muted);
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 0.4rem;
        }

        input[type="password"] {
            width: 100%;
            padding: 0.65rem 0.9rem;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="password"]:focus {
            border-color: var(--primary);
        }

        button {
            width: 100%;
            margin-top: 1.25rem;
            padding: 0.7rem;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background: var(--primary-light); }

        .error {
            display: none;
            background: #fce8e6;
            color: #c0392b;
            border-radius: 8px;
            padding: 0.6rem 0.9rem;
            font-size: 0.875rem;
            margin-top: 1rem;
            text-align: center;
        }

        .error.visible { display: block; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <h1>Hitano Bihurtzailea</h1>
            <p>Zuka → Hika itzultzailea</p>
        </div>
        <form method="post" action="/login">
            <label for="password">Pasahitza</label>
            <input type="password" id="password" name="password" autofocus autocomplete="current-password">
            <button type="submit">Sartu</button>
        </form>
        <div class="error" id="error-msg">Pasahitz okerra. Saiatu berriro.</div>
    </div>
    <script>
        if (new URLSearchParams(location.search).get('error')) {
            document.getElementById('error-msg').classList.add('visible');
        }
    </script>
</body>
</html>
