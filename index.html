<!DOCTYPE html>
<html lang="eu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hitano Bihurtzaile Automatikoa</title>
    <style>
        :root {
            --primary: #2d6a4f;
            --primary-light: #40916c;
            --primary-dark: #1b4332;
            --accent: #d4a373;
            --bg: #f8f9fa;
            --surface: #ffffff;
            --text: #212529;
            --text-muted: #6c757d;
            --border: #dee2e6;
            --toka-bg: #e8f0fe;
            --toka-highlight: #1a73e8;
            --noka-bg: #fce8e6;
            --noka-highlight: #d93025;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --shadow-lg: 0 4px 16px rgba(0,0,0,0.12);
            --radius: 12px;
            --transition: 0.2s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ─────────────────────────────────── */
        header {
            background: linear-gradient(135deg, var(--primary-dark), var(--primary));
            color: white;
            text-align: center;
            padding: 2rem 1rem 1.5rem;
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 60%);
            pointer-events: none;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            margin-bottom: 0.3rem;
        }

        header p {
            font-size: 0.95rem;
            opacity: 0.85;
            font-weight: 400;
        }

        .top-nav {
            margin-top: 0.8rem;
            display: flex;
            justify-content: center;
            gap: 0.6rem;
            flex-wrap: wrap;
        }

        .top-nav a {
            color: #fff;
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.45);
            border-radius: 999px;
            padding: 0.35rem 0.8rem;
            font-size: 0.82rem;
            font-weight: 600;
            transition: background var(--transition);
        }

        .top-nav a.active {
            background: rgba(255,255,255,0.18);
            border-color: rgba(255,255,255,0.75);
        }

        /* ── Main ───────────────────────────────────── */
        main {
            flex: 1;
            max-width: 960px;
            width: 100%;
            margin: 0 auto;
            padding: 1.5rem 1rem 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        /* ── Cards ──────────────────────────────────── */
        .card {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 1.25rem;
        }

        .card-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
        }

        .card-label .badge {
            font-size: 0.7rem;
            padding: 0.15rem 0.5rem;
            border-radius: 999px;
            font-weight: 600;
        }

        /* ── Input ──────────────────────────────────── */
        .input-card {
            border-left: 4px solid var(--primary);
        }

        .input-card .card-label { color: var(--primary); }

        textarea {
            width: 100%;
            min-height: 120px;
            padding: 0.85rem 1rem;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-family: inherit;
            font-size: 1.05rem;
            line-height: 1.6;
            color: var(--text);
            resize: vertical;
            transition: border-color var(--transition);
            background: var(--bg);
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary-light);
            background: white;
        }

        textarea::placeholder {
            color: #adb5bd;
        }

        /* ── Output grid ────────────────────────────── */
        .output-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.25rem;
        }

        @media (max-width: 640px) {
            .output-grid { grid-template-columns: 1fr; }
        }

        .output-card {
            position: relative;
        }

        .output-card.toka {
            border-left: 4px solid var(--toka-highlight);
        }
        .output-card.noka {
            border-left: 4px solid var(--noka-highlight);
        }

        .output-card.toka .card-label { color: var(--toka-highlight); }
        .output-card.noka .card-label { color: var(--noka-highlight); }

        .output-card.toka .badge {
            background: var(--toka-bg);
            color: var(--toka-highlight);
        }
        .output-card.noka .badge {
            background: var(--noka-bg);
            color: var(--noka-highlight);
        }

        .output-text {
            min-height: 80px;
            padding: 0.85rem 1rem;
            border-radius: 8px;
            font-size: 1.05rem;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .output-card.toka .output-text { background: var(--toka-bg); }
        .output-card.noka .output-text { background: var(--noka-bg); }

        .output-text .highlight {
            font-weight: 600;
            border-radius: 3px;
            padding: 0.05em 0.15em;
        }

        .output-card.toka .highlight {
            color: var(--toka-highlight);
            background: rgba(26,115,232,0.12);
        }
        .output-card.noka .highlight {
            color: var(--noka-highlight);
            background: rgba(217,48,37,0.12);
        }

        .placeholder-text {
            color: #adb5bd;
            font-style: italic;
        }

        /* ── Stats bar ──────────────────────────────── */
        .stats {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
            font-size: 0.82rem;
            color: var(--text-muted);
        }

        .stats span {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .stats .num {
            font-weight: 700;
            color: var(--primary);
        }

        .analysis-muted {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .analysis-error {
            color: #b42318;
            background: #fef3f2;
            border: 1px solid #fecdca;
            border-radius: 8px;
            padding: 0.7rem;
            font-size: 0.9rem;
        }

        /* ── Explain panel ───────────────────────────── */
        .explain-panel {
            margin-top: 0;
        }

        .explain-card {
            border-left: 4px solid #6366f1;
        }

        .explain-card .card-label { color: #6366f1; }

        .explain-flow {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
            align-items: flex-start;
            margin-bottom: 1rem;
            padding: 0.75rem;
            background: #f8f7ff;
            border-radius: 8px;
        }

        .explain-token {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            gap: 0.15rem;
        }

        .explain-token .orig {
            font-size: 0.92rem;
            font-weight: 600;
            color: var(--text);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            background: #fff;
            border: 1px solid var(--border);
        }

        .explain-token .arrow {
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .explain-token .result {
            font-size: 0.82rem;
            font-weight: 700;
            padding: 0.15rem 0.35rem;
            border-radius: 4px;
        }

        .explain-token .result.changed-toka {
            color: var(--toka-highlight);
            background: var(--toka-bg);
        }

        .explain-token .result.changed-noka {
            color: var(--noka-highlight);
            background: var(--noka-bg);
        }

        .explain-token .result.unchanged {
            color: var(--text-muted);
            background: #f1f3f5;
        }

        .explain-token .result.blocked {
            color: #b45309;
            background: #fef3c7;
        }

        .explain-sep {
            align-self: center;
            color: #ccc;
            font-size: 0.8rem;
            min-width: 0.3rem;
        }

        .explain-details {
            margin-top: 0.5rem;
        }

        .explain-step {
            display: flex;
            gap: 0.6rem;
            align-items: flex-start;
            padding: 0.55rem 0.75rem;
            border-radius: 6px;
            font-size: 0.85rem;
            line-height: 1.5;
        }

        .explain-step:nth-child(odd) { background: #f8f7ff; }

        .explain-step .step-num {
            flex-shrink: 0;
            width: 1.6rem;
            height: 1.6rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.72rem;
            font-weight: 700;
            color: #fff;
        }

        .explain-step .step-num.cat-translated { background: #6366f1; }
        .explain-step .step-num.cat-unchanged { background: #9ca3af; }
        .explain-step .step-num.cat-blocked { background: #d97706; }

        .explain-step .step-body { flex: 1; }

        .explain-step .step-word {
            font-weight: 700;
        }

        .explain-step .step-tag {
            display: inline-block;
            font-size: 0.68rem;
            font-weight: 700;
            padding: 0.08rem 0.4rem;
            border-radius: 999px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-left: 0.4rem;
            vertical-align: middle;
        }

        .step-tag.tag-verb { background: #ede9fe; color: #5b21b6; }
        .step-tag.tag-pronoun { background: #dbeafe; color: #1d4ed8; }
        .step-tag.tag-possessive { background: #fce7f3; color: #be185d; }
        .step-tag.tag-blocked { background: #fef3c7; color: #b45309; }
        .step-tag.tag-skip { background: #f1f3f5; color: #6b7280; }

        .explain-step .step-rules {
            margin-top: 0.2rem;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .explain-step .step-rules li {
            margin-left: 1rem;
            list-style: disc;
        }

        .explain-step .step-result {
            margin-top: 0.15rem;
        }

        .explain-step .step-result .toka-label { color: var(--toka-highlight); font-weight: 600; }
        .explain-step .step-result .noka-label { color: var(--noka-highlight); font-weight: 600; }

        /* ── Copy button ────────────────────────────── */
        .copy-btn {
            position: absolute;
            top: 0.75rem;
            right: 0.75rem;
            background: none;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.3rem 0.5rem;
            cursor: pointer;
            font-size: 0.75rem;
            color: var(--text-muted);
            transition: all var(--transition);
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .copy-btn:hover {
            background: var(--bg);
            color: var(--text);
            border-color: var(--text-muted);
        }

        .copy-btn.copied {
            color: var(--primary);
            border-color: var(--primary);
        }

        /* ── Info section ───────────────────────────── */
        .info-section {
            text-align: center;
            padding: 0.5rem;
        }

        .info-section details {
            display: inline-block;
            text-align: left;
            max-width: 600px;
        }

        .info-section summary {
            cursor: pointer;
            color: var(--text-muted);
            font-size: 0.85rem;
            padding: 0.3rem 0;
        }

        .info-section .info-content {
            font-size: 0.82rem;
            color: var(--text-muted);
            line-height: 1.7;
            padding: 0.75rem 0;
        }

        .info-section .info-content code {
            background: var(--bg);
            padding: 0.1rem 0.35rem;
            border-radius: 4px;
            font-size: 0.8rem;
        }

        /* ── Loading ────────────────────────────────── */
        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }

        .loading .spinner {
            display: inline-block;
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 0.75rem;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Footer ─────────────────────────────────── */
        footer {
            text-align: center;
            padding: 1rem;
            font-size: 0.78rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border);
        }

        footer a {
            color: var(--primary);
            text-decoration: none;
        }
    </style>
</head>
<body>

<header>
    <h1>Hitano Bihurtzaile Automatikoa</h1>
    <p>Zukako testua hikara itzuli — toka eta noka</p>
    <nav class="top-nav" aria-label="Nabigazioa">
        <a href="/" class="active">Itzultzailea</a>
        <a href="/latxa">Latxa</a>
    </nav>
</header>

<main id="app">
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <div>Aditz-formak kargatzen...</div>
    </div>
</main>

<footer>
    Hitano Bihurtzaile Automatikoa &middot; Zukako testua hikara
</footer>

<script>
(function () {
    'use strict';

    /* ================================================================
       1. DATUAK KARGATU
       ================================================================ */

    const DATA_URLS = [
        'json/aditz_alokutiboak.json',
        'json/aditzak_argumentala_bateratua.json',
        'json/aditz_trinkoa_argumentala.json'
    ];

    // 'zu' izenordainaren mapaketa — hitz-maila, forma osoak
    const IZENORDAIN_MAPA = new Map([
        // Forma arruntak
        ['zu',            'hi'],
        ['zuk',           'hik'],
        ['zuri',          'hiri'],
        ['zure',          'hire'],
        ['zurekin',       'hirekin'],
        ['zuretzat',      'hiretzat'],
        ['zutaz',         'hitaz'],
        ['zuregan',       'hiregan'],       // NORENGAN (zu-re-gan)
        ['zugan',         'higan'],         // NORENGAN (zu-gan)
        ['zuregandik',    'hiregandik'],    // NORENGANDIK (zu-re-gandik)
        ['zugandik',      'higandik'],      // NORENGANDIK (zu-gandik)
        ['zuregana',      'hiregana'],      // NORENGANA (zu-re-gana)
        ['zugana',        'higana'],        // NORENGANA (zu-gana)
        ['zureganantz',   'hireganantz'],   // NORENGANANTZ (zu-re-ganantz)
        ['zuganantz',     'higanantz'],     // NORENGANANTZ (zu-ganantz)
        ['zureganaino',   'hireganaino'],   // NORENGANAINO (zu-re-ganaino)
        ['zuganaino',     'higanaino'],     // NORENGANAINO (zu-ganaino)
        ['zuregatik',     'hiregatik'],     // NORENGATIK (zu-re-gatik)
        ['zugatik',       'higatik'],       // NORENGATIK (zu-gatik)
        // Forma indartuak
        ['zeu',           'heu'],
        ['zeuk',          'heuk'],
        ['zeuri',         'heuri'],
        ['zeure',         'heure'],
        ['zeurekin',      'heurekin'],
        ['zeuretzat',     'heuretzat'],
        ['zeutaz',        'heutaz'],
        ['zeuregan',      'heuregan'],      // NORENGAN (zeu-re-gan)
        ['zeugan',        'heugan'],        // NORENGAN (zeu-gan)
        ['zeuregandik',   'heuregandik'],   // NORENGANDIK (zeu-re-gandik)
        ['zeugandik',     'heugandik'],     // NORENGANDIK (zeu-gandik)
        ['zeuregana',     'heuregana'],     // NORENGANA (zeu-re-gana)
        ['zeugana',       'heugana'],       // NORENGANA (zeu-gana)
        ['zeureganantz',  'heureganantz'],  // NORENGANANTZ (zeu-re-ganantz)
        ['zeuganantz',    'heuganantz'],    // NORENGANANTZ (zeu-ganantz)
        ['zeureganaino',  'heureganaino'],  // NORENGANAINO (zeu-re-ganaino)
        ['zeuganaino',    'heuganaino'],    // NORENGANAINO (zeu-ganaino)
        ['zeuregatik',    'heuregatik'],    // NORENGATIK (zeu-re-gatik)
        ['zeugatik',      'heugatik'],      // NORENGATIK (zeu-gatik)
    ]);

    const POSSESSIVE_DECLINED_SUFFIXES = [
        'a', 'ak', 'ari', 'aren', 'arekin', 'arentzat', 'az',
        'an', 'ra', 'tik', 'ko', 'rantz', 'raino',
        'ek', 'ei', 'en', 'ekin', 'entzat', 'ez',
        'etan', 'etara', 'etatik', 'etako', 'etarantz', 'etaraino'
    ];

    for (const [sourceBase, targetBase] of [['zure', 'hire'], ['zeure', 'heure']]) {
        for (const suffix of POSSESSIVE_DECLINED_SUFFIXES) {
            const source = `${sourceBase}${suffix}`;
            const target = `${targetBase}${suffix}`;
            if (!IZENORDAIN_MAPA.has(source)) {
                IZENORDAIN_MAPA.set(source, target);
            }
        }
    }

    const FORCED_FORM_OVERRIDES = {
        toka: {
            nago: 'nauk'
        },
        noka: {
            nago: 'naun'
        }
    };

    function normalizeAditza(entry) {
        if (!entry || typeof entry.aditza !== 'string') return '';
        return entry.aditza.trim().toLowerCase();
    }

    function detectSecondPersonArgumental(entry, sourceUrl) {
        // Aditzak.eus eta argumental fitxategiak 2. pertsona argumentalak dira
        if (sourceUrl && sourceUrl !== 'json/aditz_alokutiboak.json') return true;

        const values = [entry.nor, entry.nork, entry.nori]
            .filter(Boolean)
            .map(v => String(v).trim().toLowerCase());

        if (values.includes('zu') || values.includes('zuk') || values.includes('zuri')) {
            return true;
        }

        if (typeof entry.saila === 'string' && /\(zu\s+(nork|nori)\)/i.test(entry.saila)) {
            return true;
        }

        return false;
    }

    function noEsVerboComoBada(verboOriginal) {
        // "bada" kasu anbiguoa da; ez blokeatu automatikoki ba- arauarekin.
        return verboOriginal !== 'bada';
    }

    function esSubordinadaBloqueada(verboOriginal, lemaVerbo, esSegundaPersona) {
        if (esSegundaPersona) {
            return false;
        }

        if (verboOriginal.startsWith('ba') && noEsVerboComoBada(verboOriginal)) {
            return true;
        }

        const sufijosInequivocos = [
            'eino', 'eno', 'larik', 'elarik', 'nean', 'enean', 'neko', 'eneko',
            'nerako', 'enerako', 'netik', 'enetik', 'lako', 'elako', 'lakoz',
            'elakoz', 'lakotz', 'elakotz', 'lakoan', 'elakoan', 'na', 'ena',
            'nentz', 'enentz', 'netz', 'enetz', 'nez', 'enez', 'nik', 'enik',
            'la', 'ela'
        ];

        if (sufijosInequivocos.some(s => verboOriginal.endsWith(s))) {
            return true;
        }

        if (verboOriginal.endsWith('n') || verboOriginal.endsWith('en')) {
            // -n / -en kasuan parserrik gabe ez dugu ziurtasunik.
            // Oraingoz ez dugu blokeatzen automatikoki.
            void lemaVerbo;
        }

        return false;
    }

    /**
     * JSON-tik lookup-mapak sortu.
     * zukaToToka / zukaToNoka: Map<lowercase_zuka, meta>
     *
     * meta = {
     *   form: string,
     *   lemaVerbo: string,
     *   esSegundaPersona: boolean,
     *   isVerb: boolean
     * }
     *
     * Koma bidez bereizitako alternatibak (zuka: "a, b" / toka: "c, d")
     * banan-banan mapeatu: a→c, b→d
     */
    function buildLookup(data) {
        const toka = new Map();
        const noka = new Map();

        for (const entry of data) {
            const zukas = entry.zuka.split(',').map(s => s.trim()).filter(Boolean);
            const tokas = entry.hika_toka.split(',').map(s => s.trim()).filter(Boolean);
            const nokas = entry.hika_noka.split(',').map(s => s.trim()).filter(Boolean);

            for (let i = 0; i < zukas.length; i++) {
                const key = zukas[i].toLowerCase();
                const tVal = tokas[i] || tokas[0] || '';
                const nVal = nokas[i] || nokas[0] || '';
                const lemma = normalizeAditza(entry);
                const esSegundaPersona = detectSecondPersonArgumental(entry, entry.__sourceUrl);
                const tokaMeta = {
                    form: tVal,
                    lemaVerbo: lemma,
                    esSegundaPersona,
                    isVerb: true
                };
                const nokaMeta = {
                    form: nVal,
                    lemaVerbo: lemma,
                    esSegundaPersona,
                    isVerb: true
                };

                if (!toka.has(key)) {
                    toka.set(key, tokaMeta);
                } else if (esSegundaPersona) {
                    const prev = toka.get(key);
                    prev.esSegundaPersona = true;
                    if (!prev.lemaVerbo && lemma) prev.lemaVerbo = lemma;
                }

                if (!noka.has(key)) {
                    noka.set(key, nokaMeta);
                } else if (esSegundaPersona) {
                    const prev = noka.get(key);
                    prev.esSegundaPersona = true;
                    if (!prev.lemaVerbo && lemma) prev.lemaVerbo = lemma;
                }
            }
        }

        // Lexical preference overrides for expected hitano outputs.
        for (const [zuka, hika] of Object.entries(FORCED_FORM_OVERRIDES.toka)) {
            toka.set(zuka, {
                form: hika,
                lemaVerbo: 'izan',
                esSegundaPersona: false,
                isVerb: true
            });
        }
        for (const [zuka, hika] of Object.entries(FORCED_FORM_OVERRIDES.noka)) {
            noka.set(zuka, {
                form: hika,
                lemaVerbo: 'izan',
                esSegundaPersona: false,
                isVerb: true
            });
        }

        return { toka, noka };
    }

    /**
     * Izenordain-mapa aditz-lookup-ean gehitu (aditz-forma batek lehentasuna du).
     */
    function mergePronouns(lookup, pronounMap) {
        for (const [zu, hi] of pronounMap) {
            const pronMeta = {
                form: hi,
                lemaVerbo: '',
                esSegundaPersona: true,
                isVerb: false
            };
            if (!lookup.toka.has(zu)) lookup.toka.set(zu, pronMeta);
            if (!lookup.noka.has(zu)) lookup.noka.set(zu, pronMeta);
        }
    }

    /* ================================================================
       2. ITZULPENA
       ================================================================ */

    /**
     * Testua tokenizatu: hitzak eta ez-hitzak (puntuazioa, espazioak) banatu.
     * Token bakoitza: { text, isWord }
     */
    function tokenize(text) {
        const tokens = [];
        const re = /([a-zA-ZñÑçÇáéíóúàèìòùäëïöüâêîôû]+)|([^a-zA-ZñÑçÇáéíóúàèìòùäëïöüâêîôû]+)/g;
        let m;
        while ((m = re.exec(text)) !== null) {
            tokens.push({
                text: m[0],
                isWord: !!m[1]
            });
        }
        return tokens;
    }

    /**
     * Kasu-patroia transferitu: jatorrizko hitzaren maiuskula/minuskula
     * patroia itzulpenari aplikatu.
     */
    function transferCase(original, translated) {
        if (!original || !translated) return translated;

        // Guztia maiuskula
        if (original === original.toUpperCase() && original !== original.toLowerCase()) {
            return translated.toUpperCase();
        }
        // Lehen letra maiuskula
        if (original[0] === original[0].toUpperCase() && original[0] !== original[0].toLowerCase()) {
            return translated[0].toUpperCase() + translated.slice(1);
        }
        return translated;
    }

    /**
     * Testua itzuli.
     * Itzultzen du: { html: string (highlight markupekin), plain: string, count: number }
     */
    function translate(text, lookupMap, zuriColorWordPositions = new Set()) {
        const tokens = tokenize(text);
        let html = '';
        let plain = '';
        let count = 0;
        let wordIndex = -1;

        for (const token of tokens) {
            if (!token.isWord) {
                const escaped = escapeHtml(token.text);
                html += escaped;
                plain += token.text;
                continue;
            }

            wordIndex += 1;

            const key = token.text.toLowerCase();

            // "zuri" kolorea dela detektatzen bada, ez ordezkatu "hiri"-rekin.
            if (key === 'zuri' && zuriColorWordPositions.has(wordIndex)) {
                html += escapeHtml(token.text);
                plain += token.text;
                continue;
            }

            const mapped = lookupMap.get(key);

            if (mapped) {
                if (mapped.isVerb && esSubordinadaBloqueada(key, mapped.lemaVerbo, mapped.esSegundaPersona)) {
                    html += escapeHtml(token.text);
                    plain += token.text;
                    continue;
                }

                const translated = transferCase(token.text, mapped.form);
                html += `<span class="highlight">${escapeHtml(translated)}</span>`;
                plain += translated;
                count++;
            } else {
                html += escapeHtml(token.text);
                plain += token.text;
            }
        }

        return { html, plain, count };
    }

    function escapeHtml(s) {
        return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    async function translateAndAnalyzeText(text) {
        const resp = await fetch('/api/translate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text })
        });
        const payload = await resp.json();
        if (!resp.ok) {
            throw new Error(payload.error || 'Ezin izan da itzulpena lortu.');
        }
        return payload;
    }

    /* ================================================================
       3. UI
       ================================================================ */

    function renderApp() {
        return `
            <div class="card input-card">
                <div class="card-label">
                    Sarrera
                    <span class="badge" style="background:rgba(45,106,79,0.1);color:var(--primary)">Zuka</span>
                </div>
                <textarea id="input"
                    placeholder="Idatzi zukako testua hemen... Adibidez: &quot;Nola zaude? Zer egin duzu gaur?&quot;"
                    spellcheck="false"
                    autofocus></textarea>
            </div>

            <div class="output-grid">
                <div class="card output-card toka">
                    <div class="card-label">
                        Irteera
                        <span class="badge">Toka ♂</span>
                    </div>
                    <button class="copy-btn" data-target="toka" title="Kopiatu">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
                        Kopiatu
                    </button>
                    <div class="output-text" id="output-toka">
                        <span class="placeholder-text">Hemen tokako itzulpena agertuko da...</span>
                    </div>
                </div>

                <div class="card output-card noka">
                    <div class="card-label">
                        Irteera
                        <span class="badge">Noka ♀</span>
                    </div>
                    <button class="copy-btn" data-target="noka" title="Kopiatu">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
                        Kopiatu
                    </button>
                    <div class="output-text" id="output-noka">
                        <span class="placeholder-text">Hemen nokako itzulpena agertuko da...</span>
                    </div>
                </div>
            </div>

            <div class="stats" id="stats" style="display:none">
                <span>Ordezkatuak: <span class="num" id="stat-replaced">0</span></span>
                <span>Mapako formak: <span class="num" id="stat-forms">0</span></span>
            </div>

            <div class="explain-panel" id="explain-panel">
                <div class="card explain-card">
                    <div class="card-label">
                        Itzulpen-pausoak
                        <span class="badge" style="background:#ede9fe;color:#6366f1">Azalpena</span>
                    </div>
                    <div id="explain-content"></div>
                </div>
            </div>

            <div class="info-section">
                <details>
                    <summary>Nola funtzionatzen du?</summary>
                    <div class="info-content">
                        Tresna honek zukako testua hikara (toka eta noka) itzultzen du, pauso hauek jarraituz:
                        <br><br>
                        <strong>1. Bilaketa-taulak:</strong> 3 JSON fitxategitatik (+1500 aditz-forma) eta izenordain-mapa batetik
                        (<code>zu→hi, zuk→hik, zuri→hiri...</code>) lookup-mapak eraikitzen dira. Posesiboen deklinabide-formak
                        (<code>zurea, zureak, zurekin...</code>) ere automatikoki sortzen dira.
                        <br><br>
                        <strong>2. Tokenizazioa:</strong> Testua hitzetan eta ez-hitzetan (puntuazioa, zuriuneak) banatzen da.
                        <br><br>
                        <strong>3. Token bakoitzeko itzulpena:</strong>
                        <ul style="margin:0.3rem 0 0.3rem 1.2rem">
                            <li><em>Zuri desanbiguazioa:</em> «zuri» kolorea den kasuetan, ez da «hiri»-ra aldatzen (Stanza NLP bidez).</li>
                            <li><em>Menpeko perpaus blokeoa:</em> 3. pertsonako aditzak ba-/bait- aurrizkiarekin edo
                                menpeko atzizkiekin (-lako, -nean, -la...) blokeatzen dira, alokutiboa ez baita aldatzen.</li>
                            <li><em>ba-/bait- aurrizkiak:</em> Aurrizkia kendu, enborra itzuli, eta aurrizkia berriro gehitzen da.</li>
                            <li><em>Menpeko atzizkiak:</em> Atzizkia banandu, enborra itzuli, eta atzizkia lotzen da.
                                Bokal-lotura araua: enborra bokalaz amaitzen bada eta atzizkia «e»-z hasten, «e» kentzen da
                                (adib. <code>hoa+elako → hoalako</code>).</li>
                            <li><em>Kasu-transferentzia:</em> Jatorrizkoaren maiuskula/minuskula patroia mantentzen da.</li>
                            <li><em>HTML nabarmentzea:</em> Itzulitako hitzak &lt;span class="highlight"&gt; bidez markatzen dira.</li>
                        </ul>
                        <br>
                        <strong>Mugak:</strong> Hitz-mailako ordezkapena da; testuinguru gramatikala ez du guztiz kontuan hartzen.
                        Zuka eta hika berdinak diren formak (adib. <code>dut</code>) ez dira aldatzen.
                    </div>
                </details>
            </div>
        `;
    }

    /* ================================================================
       4. HASIERATU
       ================================================================ */

    async function init() {
        const app = document.getElementById('app');

        // UI marraztu
        app.innerHTML = renderApp();

        const input = document.getElementById('input');
        const outToka = document.getElementById('output-toka');
        const outNoka = document.getElementById('output-noka');
        const stats = document.getElementById('stats');
        const statReplaced = document.getElementById('stat-replaced');
        const statForms = document.getElementById('stat-forms');
        const explainContent = document.getElementById('explain-content');

        statForms.textContent = '-';
        let analysisRequestId = 0;

        // Debounced itzulpena
        let timer;
        input.addEventListener('input', () => {
            clearTimeout(timer);
            timer = setTimeout(doTranslate, 120);
        });

        async function doTranslate() {
            const text = input.value.trim();
            const currentId = ++analysisRequestId;

            if (!text) {
                outToka.innerHTML = '<span class="placeholder-text">Hemen tokako itzulpena agertuko da...</span>';
                outNoka.innerHTML = '<span class="placeholder-text">Hemen nokako itzulpena agertuko da...</span>';
                stats.style.display = 'none';
                explainContent.innerHTML = '';
                return;
            }

            let payload = null;
            try {
                payload = await translateAndAnalyzeText(text);
            } catch (err) {
                if (currentId !== analysisRequestId) return;
                outToka.innerHTML = '<span class="placeholder-text">Errorea itzulpenean.</span>';
                outNoka.innerHTML = '<span class="placeholder-text">Errorea itzulpenean.</span>';
                stats.style.display = 'none';
                analysisContent.innerHTML = `<div class="analysis-error">${escapeHtml(err.message || 'Errore ezezaguna')}</div>`;
                return;
            }

            if (currentId !== analysisRequestId) return;

            const toka = payload.toka || { html: '', count: 0 };
            const noka = payload.noka || { html: '', count: 0 };

            outToka.innerHTML = toka.html || '<span class="placeholder-text">-</span>';
            outNoka.innerHTML = noka.html || '<span class="placeholder-text">-</span>';

            statReplaced.textContent = Math.max(toka.count || 0, noka.count || 0);
            if (payload.total_forms !== undefined && payload.total_forms !== null) {
                statForms.textContent = String(payload.total_forms);
            }
            stats.style.display = 'flex';
            fetchAndRenderExplain(text);
        }

        async function fetchAndRenderExplain(text) {
            explainContent.innerHTML = '<div class="analysis-muted">Kargatzen...</div>';
            try {
                const resp = await fetch('/api/explain', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });
                const data = await resp.json();
                explainContent.innerHTML = renderExplainSteps(data.steps || []);
            } catch (e) {
                explainContent.innerHTML = '<div class="analysis-error">' + escapeHtml(e.message) + '</div>';
            }
        }

        function renderExplainSteps(steps) {
            const wordSteps = steps.filter(s => s.type === 'word');
            if (!wordSteps.length) return '<div class="analysis-muted">Ez dago hitzik aztertzeko.</div>';

            // Flow visualization
            let flowHtml = '<div class="explain-flow">';
            for (const s of steps) {
                if (s.type === 'separator') {
                    const vis = s.token.replace(/ /g, '\u00b7').replace(/\n/g, '\u21b5');
                    flowHtml += '<span class="explain-sep">' + escapeHtml(vis) + '</span>';
                    continue;
                }
                let resultClass = 'unchanged';
                let resultText = s.token;
                if (s.action === 'translated') {
                    resultClass = 'changed-toka';
                    resultText = s.toka || s.token;
                } else if (s.action === 'blocked') {
                    resultClass = 'blocked';
                }
                flowHtml += '<span class="explain-token">';
                flowHtml += '<span class="orig">' + escapeHtml(s.token) + '</span>';
                if (s.action === 'translated') {
                    flowHtml += '<span class="arrow">\u2193</span>';
                    flowHtml += '<span class="result ' + resultClass + '">' + escapeHtml(resultText) + '</span>';
                } else if (s.action === 'blocked') {
                    flowHtml += '<span class="arrow">\u2717</span>';
                    flowHtml += '<span class="result ' + resultClass + '">blokeatua</span>';
                }
                flowHtml += '</span>';
            }
            flowHtml += '</div>';

            // Detail list
            let detailHtml = '<div class="explain-details">';
            let num = 0;
            for (const s of wordSteps) {
                num++;
                let catClass = 'cat-unchanged';
                let tagHtml = '';
                if (s.action === 'translated') {
                    catClass = 'cat-translated';
                    const cat = s.category || '';
                    if (cat.includes('aditz')) tagHtml = '<span class="step-tag tag-verb">Aditza</span>';
                    else if (cat === 'izenordaina') tagHtml = '<span class="step-tag tag-pronoun">Izenordaina</span>';
                    else if (cat === 'posesiboa') tagHtml = '<span class="step-tag tag-possessive">Posesiboa</span>';
                } else if (s.action === 'blocked') {
                    catClass = 'cat-blocked';
                    tagHtml = '<span class="step-tag tag-blocked">Blokeatua</span>';
                } else {
                    tagHtml = '<span class="step-tag tag-skip">Mantendua</span>';
                }

                let bodyHtml = '<span class="step-word">' + escapeHtml(s.token) + '</span>' + tagHtml;

                if (s.action === 'translated') {
                    bodyHtml += '<div class="step-result">';
                    bodyHtml += '<span class="toka-label">Toka:</span> ' + escapeHtml(s.toka || '') + ' \u00b7 ';
                    bodyHtml += '<span class="noka-label">Noka:</span> ' + escapeHtml(s.noka || '');
                    bodyHtml += '</div>';
                }

                if (s.reason) {
                    bodyHtml += '<div class="step-rules"><em>' + escapeHtml(s.reason) + '</em></div>';
                }

                if (s.rules && s.rules.length) {
                    bodyHtml += '<ul class="step-rules">';
                    for (const r of s.rules) {
                        bodyHtml += '<li>' + escapeHtml(r) + '</li>';
                    }
                    bodyHtml += '</ul>';
                }

                detailHtml += '<div class="explain-step">';
                detailHtml += '<span class="step-num ' + catClass + '">' + num + '</span>';
                detailHtml += '<div class="step-body">' + bodyHtml + '</div>';
                detailHtml += '</div>';
            }
            detailHtml += '</div>';

            return flowHtml + detailHtml;
        }

        // Kopiatu botoiak
        document.querySelectorAll('.copy-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                const target = btn.dataset.target;
                const el = document.getElementById('output-' + target);
                const plainText = el.innerText;
                if (!plainText || el.querySelector('.placeholder-text')) return;

                try {
                    await navigator.clipboard.writeText(plainText);
                    btn.classList.add('copied');
                    const original = btn.innerHTML;
                    btn.innerHTML = btn.innerHTML.replace('Kopiatu', 'Kopiatuta!');
                    setTimeout(() => {
                        btn.classList.remove('copied');
                        btn.innerHTML = original;
                    }, 1500);
                } catch {
                    // fallback
                }
            });
        });
    }

    // Abiarazi
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
})();
</script>
